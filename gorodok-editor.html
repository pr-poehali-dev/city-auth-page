<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Городок — Редактор карты</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#f5a623;--gold-lt:#ffd166;--gold-dk:#c47c10;
  --bg:#04060e;--panel:rgba(6,11,26,0.97);--border:rgba(245,166,35,0.28);
  --p2:'Press Start 2P',monospace;
  --sidebar:240px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'VT323',monospace;color:#d4e8ff;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(245,166,35,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(245,166,35,0.02) 1px,transparent 1px);
  background-size:40px 40px;}

/* ── LAYOUT ── */
#app{display:flex;width:100%;height:100%;position:relative;z-index:1;}
#sidebar{width:var(--sidebar);flex-shrink:0;background:var(--panel);border-right:1.5px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;z-index:10;}
#canvas-wrap{flex:1;position:relative;overflow:hidden;cursor:crosshair;}
canvas#map-canvas{position:absolute;inset:0;display:block;image-rendering:pixelated;}

/* ── SIDEBAR ── */
.sb-section{padding:10px;border-bottom:1px solid var(--border);}
.sb-title{font-family:var(--p2);font-size:6px;color:var(--gold);letter-spacing:2px;margin-bottom:10px;}

/* tools */
.tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.tool-btn{background:rgba(0,0,0,0.4);border:1.5px solid rgba(245,166,35,0.18);
  padding:7px 4px;cursor:pointer;transition:all .13s;text-align:center;
  font-family:var(--p2);font-size:5px;color:rgba(245,166,35,0.5);letter-spacing:.5px;}
.tool-btn:hover{border-color:rgba(245,166,35,0.5);color:var(--gold);}
.tool-btn.active{border-color:var(--gold);background:rgba(245,166,35,0.1);color:var(--gold);}
.tool-icon{font-size:14px;display:block;margin-bottom:3px;}

/* tiles palette */
.tiles-list{display:flex;flex-direction:column;gap:4px;overflow-y:auto;flex:1;}
.tile-item{display:flex;align-items:center;gap:8px;padding:7px 8px;cursor:pointer;
  border:1.5px solid transparent;transition:all .12s;}
.tile-item:hover{border-color:rgba(245,166,35,0.3);background:rgba(245,166,35,0.04);}
.tile-item.active{border-color:var(--gold);background:rgba(245,166,35,0.08);}
.tile-swatch{width:22px;height:22px;flex-shrink:0;border:1px solid rgba(255,255,255,0.1);}
.tile-info{flex:1;min-width:0;}
.tile-name{font-family:var(--p2);font-size:6px;color:var(--gold);margin-bottom:2px;}
.tile-walk{font-size:11px;color:rgba(180,200,240,0.5);}

/* props panel */
.props-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.props-lbl{font-family:var(--p2);font-size:5.5px;color:rgba(245,166,35,0.5);}
.toggle{width:32px;height:16px;background:rgba(0,0,0,0.5);border:1px solid rgba(245,166,35,0.3);
  position:relative;cursor:pointer;transition:background .15s;}
.toggle.on{background:rgba(42,138,74,0.5);border-color:#2a8a4a;}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;
  background:#888;transition:all .15s;}
.toggle.on::after{left:18px;background:#2a8a4a;}

/* action buttons */
.action-btn{width:100%;padding:9px;margin-bottom:5px;font-family:var(--p2);font-size:6px;
  letter-spacing:1px;cursor:pointer;border:1.5px solid;transition:all .13s;}
.action-btn.primary{background:linear-gradient(180deg,rgba(42,111,219,0.3),rgba(20,60,160,0.3));
  border-color:rgba(42,111,219,0.5);color:#a0c8ff;}
.action-btn.primary:hover{border-color:#2a6fdb;box-shadow:0 0 12px rgba(42,111,219,0.3);}
.action-btn.success{background:linear-gradient(180deg,rgba(42,138,74,0.3),rgba(20,80,40,0.3));
  border-color:rgba(42,138,74,0.5);color:#69f0ae;}
.action-btn.success:hover{border-color:#2a8a4a;box-shadow:0 0 12px rgba(42,138,74,0.25);}
.action-btn.danger{background:rgba(0,0,0,0.3);border-color:rgba(255,80,80,0.3);color:#ff8080;}
.action-btn.danger:hover{border-color:#ff5050;box-shadow:0 0 10px rgba(255,80,80,0.2);}
.action-btn:disabled{opacity:.35;cursor:not-allowed;}

/* ── TOPBAR ── */
#topbar{position:fixed;top:0;left:var(--sidebar);right:0;height:38px;z-index:20;
  background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:14px;}
.tb-title{font-family:var(--p2);font-size:8px;color:var(--gold);letter-spacing:3px;}
.tb-info{font-size:13px;color:rgba(180,200,240,0.5);flex:1;}
.tb-status{font-family:var(--p2);font-size:6px;padding:4px 10px;border:1px solid;letter-spacing:1px;}
.tb-status.ok{color:#69f0ae;border-color:rgba(105,240,174,0.35);}
.tb-status.err{color:#ff8080;border-color:rgba(255,80,80,0.35);}
.tb-status.load{color:rgba(245,166,35,0.6);border-color:rgba(245,166,35,0.25);}

/* map canvas area gets top padding */
#canvas-wrap{padding-top:38px;}
canvas#map-canvas{top:38px;}

/* ── HOVER TOOLTIP ── */
#tooltip{position:fixed;bottom:12px;left:calc(var(--sidebar) + 14px);
  font-family:var(--p2);font-size:6px;color:rgba(245,166,35,0.6);
  background:rgba(4,6,14,0.85);padding:5px 10px;border:1px solid var(--border);
  pointer-events:none;z-index:30;}

/* ── FILL SELECTION OVERLAY ── */
#sel-info{position:fixed;bottom:12px;right:14px;
  font-family:var(--p2);font-size:6px;color:rgba(105,240,174,0.7);
  background:rgba(4,6,14,0.85);padding:5px 10px;border:1px solid rgba(105,240,174,0.2);
  pointer-events:none;z-index:30;display:none;}

/* ── MINIMAP ── */
#minimap-wrap{position:fixed;bottom:12px;right:14px;z-index:25;
  background:rgba(4,6,14,0.9);border:1.5px solid var(--border);padding:3px;}
#minimap{display:block;image-rendering:pixelated;}
</style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">

    <div class="sb-section">
      <div class="sb-title">⚒ ИНСТРУМЕНТЫ</div>
      <div class="tools-grid">
        <div class="tool-btn active" id="tool-draw" onclick="setTool('draw')">
          <span class="tool-icon">✏️</span>КИСТЬ
        </div>
        <div class="tool-btn" id="tool-fill" onclick="setTool('fill')">
          <span class="tool-icon">🪣</span>ЗАЛИВКА
        </div>
        <div class="tool-btn" id="tool-rect" onclick="setTool('rect')">
          <span class="tool-icon">⬛</span>ПРЯМОУГ.
        </div>
        <div class="tool-btn" id="tool-erase" onclick="setTool('erase')">
          <span class="tool-icon">🧹</span>ЛАСТИК
        </div>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-title">🎨 ТАЙЛЫ</div>
      <div class="tiles-list" id="tiles-list"></div>
    </div>

    <div class="sb-section">
      <div class="sb-title">⚙ СВОЙСТВА</div>
      <div class="props-row">
        <span class="props-lbl">ПРОХОДИМОСТЬ</span>
        <div class="toggle" id="walkable-toggle" onclick="toggleWalkable()"></div>
      </div>
      <div style="font-size:11px;color:rgba(180,200,240,0.4);line-height:1.4;" id="walkable-hint">
        Персонаж может пройти через этот тайл
      </div>
    </div>

    <div class="sb-section" style="margin-top:auto;">
      <div class="sb-title">💾 КАРТА</div>
      <button class="action-btn success" onclick="saveMap()" id="btn-save">💾 СОХРАНИТЬ В БД</button>
      <button class="action-btn primary" onclick="loadMap()" id="btn-load">📥 ЗАГРУЗИТЬ ИЗ БД</button>
      <button class="action-btn primary" onclick="exportToGame()">🎮 В ИГРУ</button>
      <button class="action-btn danger" onclick="confirmReset()">🗑 СБРОСИТЬ КАРТУ</button>
    </div>

  </div>

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="tb-title">⬡ РЕДАКТОР КАРТЫ</div>
    <div class="tb-info" id="tb-info">50×50 клеток • Колесико — зум • ПКМ — перемещение</div>
    <div class="tb-status load" id="tb-status">ОЖИДАНИЕ</div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-wrap">
    <canvas id="map-canvas"></canvas>
  </div>

</div>

<!-- TOOLTIP -->
<div id="tooltip">X:0 Y:0</div>
<!-- SEL INFO -->
<div id="sel-info" id="sel-info"></div>
<!-- MINIMAP -->
<div id="minimap-wrap">
  <canvas id="minimap" width="100" height="100"></canvas>
</div>

<script>
'use strict';

/* ════════════════════════════════════
   CONFIG
════════════════════════════════════ */
const API_URL = 'https://functions.poehali.dev/3a5ea315-ca2d-477d-88ea-af7e65fcdc15';
const MAP_W = 50, MAP_H = 50;
const CELL = 20; // px per cell in editor (base, before zoom)

/* ════════════════════════════════════
   TILE DEFINITIONS
════════════════════════════════════ */
const TILES = [
  { id: 0, key: 'grass',    name: 'Трава',      icon: '🌿', color: '#1e3a14', walkable: true  },
  { id: 1, key: 'road',     name: 'Дорога',     icon: '🛣️', color: '#232b38', walkable: true  },
  { id: 2, key: 'building', name: 'Здание',     icon: '🏠', color: '#243450', walkable: false },
  { id: 3, key: 'tree',     name: 'Дерево',     icon: '🌲', color: '#112808', walkable: false },
  { id: 4, key: 'hospital', name: 'Больница',   icon: '🏥', color: '#b0d4e8', walkable: false },
  { id: 5, key: 'mall',     name: 'Торг. центр',icon: '🏬', color: '#2a2245', walkable: false },
  { id: 6, key: 'prison',   name: 'Тюрьма',     icon: '⛓️', color: '#1e1e18', walkable: false },
];
const TILE_BY_ID = Object.fromEntries(TILES.map(t => [t.id, t]));

/* ════════════════════════════════════
   STATE
════════════════════════════════════ */
// map[y][x] = { tile_type, walkable, sprite_id }
const map = Array.from({length: MAP_H}, () =>
  Array.from({length: MAP_W}, () => ({tile_type: 0, walkable: true, sprite_id: 'grass'}))
);

let activeTileId = 0;
let customWalkable = true; // override walkable for active tile
let tool = 'draw'; // draw | fill | rect | erase

// camera / zoom
let zoom = 1.0;
let camX = 0, camY = 0; // world coords of top-left
let isDragging = false, dragStart = {x:0,y:0}, camStart = {x:0,y:0};

// rect tool
let rectStart = null, rectEnd = null, isRectDragging = false;

// dirty tiles for batched save
const dirty = new Set();

/* ════════════════════════════════════
   CANVAS SETUP
════════════════════════════════════ */
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
let CW, CH;

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  CW = canvas.width  = wrap.clientWidth;
  CH = canvas.height = wrap.clientHeight - 38;
  render();
}
window.addEventListener('resize', resize);

/* ════════════════════════════════════
   COORDINATE HELPERS
════════════════════════════════════ */
function worldToScreen(wx, wy) {
  return {
    sx: (wx - camX) * CELL * zoom,
    sy: (wy - camY) * CELL * zoom,
  };
}
function screenToWorld(sx, sy) {
  return {
    wx: sx / (CELL * zoom) + camX,
    wy: sy / (CELL * zoom) + camY,
  };
}
function screenToCell(sx, sy) {
  const {wx, wy} = screenToWorld(sx, sy);
  return {cx: Math.floor(wx), cy: Math.floor(wy)};
}
function clampCell(cx, cy) {
  return {cx: Math.max(0, Math.min(MAP_W-1, cx)), cy: Math.max(0, Math.min(MAP_H-1, cy))};
}

/* ════════════════════════════════════
   RENDER
════════════════════════════════════ */
function render() {
  if (!CW) return;
  ctx.fillStyle = '#04060e';
  ctx.fillRect(0, 0, CW, CH);

  const cellPx = CELL * zoom;
  const x0 = Math.floor(camX), y0 = Math.floor(camY);
  const x1 = Math.ceil(camX + CW / cellPx) + 1;
  const y1 = Math.ceil(camY + CH / cellPx) + 1;

  for (let y = Math.max(0, y0); y < Math.min(MAP_H, y1); y++) {
    for (let x = Math.max(0, x0); x < Math.min(MAP_W, x1); x++) {
      const cell = map[y][x];
      const tile = TILE_BY_ID[cell.tile_type] || TILES[0];
      const {sx, sy} = worldToScreen(x, y);

      // fill
      ctx.fillStyle = tile.color;
      ctx.fillRect(Math.floor(sx), Math.floor(sy), Math.ceil(cellPx)+1, Math.ceil(cellPx)+1);

      // walkable indicator
      if (!cell.walkable && cellPx > 8) {
        ctx.fillStyle = 'rgba(255,50,50,0.18)';
        ctx.fillRect(Math.floor(sx), Math.floor(sy), Math.ceil(cellPx)+1, Math.ceil(cellPx)+1);
      }

      // grid lines
      if (cellPx > 5) {
        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(Math.floor(sx)+0.5, Math.floor(sy)+0.5, Math.ceil(cellPx), Math.ceil(cellPx));
      }

      // tile icon (when zoomed in enough)
      if (cellPx >= 20 && tile.icon) {
        const fs = Math.min(14, cellPx * 0.55);
        ctx.font = `${fs}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(tile.icon, Math.floor(sx + cellPx/2), Math.floor(sy + cellPx/2));
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
      }

      // dirty marker
      if (dirty.has(`${x},${y}`) && cellPx > 8) {
        ctx.fillStyle = 'rgba(245,166,35,0.35)';
        ctx.fillRect(Math.floor(sx), Math.floor(sy), 4, 4);
      }
    }
  }

  // Grid coord labels
  if (cellPx >= 28) {
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = `${Math.max(7, cellPx * 0.22)}px monospace`;
    for (let y = Math.max(0, y0); y < Math.min(MAP_H, y1); y++) {
      for (let x = Math.max(0, x0); x < Math.min(MAP_W, x1); x++) {
        const {sx, sy} = worldToScreen(x, y);
        ctx.fillText(`${x},${y}`, Math.floor(sx+2), Math.floor(sy+cellPx-3));
      }
    }
  }

  // Rect selection overlay
  if (tool === 'rect' && rectStart && rectEnd) {
    const ax = Math.min(rectStart.cx, rectEnd.cx);
    const ay = Math.min(rectStart.cy, rectEnd.cy);
    const bx = Math.max(rectStart.cx, rectEnd.cx);
    const by = Math.max(rectStart.cy, rectEnd.cy);
    const {sx: rx, sy: ry} = worldToScreen(ax, ay);
    const rw = (bx - ax + 1) * cellPx;
    const rh = (by - ay + 1) * cellPx;
    ctx.fillStyle = 'rgba(105,240,174,0.12)';
    ctx.fillRect(rx, ry, rw, rh);
    ctx.strokeStyle = 'rgba(105,240,174,0.7)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.strokeRect(rx, ry, rw, rh);
    ctx.setLineDash([]);

    const w = bx - ax + 1, h = by - ay + 1;
    const si = document.getElementById('sel-info');
    si.style.display = 'block';
    si.textContent = `${ax},${ay} → ${bx},${by}  [${w}×${h} = ${w*h} клеток]`;
  } else {
    document.getElementById('sel-info').style.display = 'none';
  }

  // Minimap
  renderMinimap();
}

/* ── Minimap ── */
const mm = document.getElementById('minimap');
const mmCtx = mm.getContext('2d');
function renderMinimap() {
  const S = 2; // px per cell
  mm.width = MAP_W * S; mm.height = MAP_H * S;
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const tile = TILE_BY_ID[map[y][x].tile_type] || TILES[0];
      mmCtx.fillStyle = tile.color;
      mmCtx.fillRect(x * S, y * S, S, S);
    }
  }
  // viewport indicator
  const cellPx = CELL * zoom;
  const vx = camX * S, vy = camY * S;
  const vw = (CW / cellPx) * S, vh = (CH / cellPx) * S;
  mmCtx.strokeStyle = 'rgba(245,166,35,0.8)';
  mmCtx.lineWidth = 1;
  mmCtx.strokeRect(vx, vy, vw, vh);
}

/* ════════════════════════════════════
   PAINT HELPERS
════════════════════════════════════ */
function paintCell(cx, cy) {
  const {cx: x, cy: y} = clampCell(cx, cy);
  if (tool === 'erase') {
    map[y][x] = {tile_type: 0, walkable: true, sprite_id: 'grass'};
  } else {
    const tile = TILE_BY_ID[activeTileId];
    map[y][x] = {tile_type: activeTileId, walkable: customWalkable, sprite_id: tile.key};
  }
  dirty.add(`${x},${y}`);
}

function floodFill(startX, startY) {
  const targetType = map[startY][startX].tile_type;
  if (targetType === activeTileId && tool !== 'erase') return;
  const tile = TILE_BY_ID[activeTileId];
  const visited = new Set();
  const queue = [[startX, startY]];
  while (queue.length) {
    const [x, y] = queue.shift();
    const key = `${x},${y}`;
    if (visited.has(key)) continue;
    if (x < 0 || y < 0 || x >= MAP_W || y >= MAP_H) continue;
    if (map[y][x].tile_type !== targetType) continue;
    visited.add(key);
    map[y][x] = tool === 'erase'
      ? {tile_type: 0, walkable: true, sprite_id: 'grass'}
      : {tile_type: activeTileId, walkable: customWalkable, sprite_id: tile.key};
    dirty.add(key);
    queue.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
}

function applyRect(ax, ay, bx, by) {
  const tile = TILE_BY_ID[activeTileId];
  for (let y = ay; y <= by; y++) {
    for (let x = ax; x <= bx; x++) {
      map[y][x] = tool === 'erase'
        ? {tile_type: 0, walkable: true, sprite_id: 'grass'}
        : {tile_type: activeTileId, walkable: customWalkable, sprite_id: tile.key};
      dirty.add(`${x},${y}`);
    }
  }
}

/* ════════════════════════════════════
   MOUSE EVENTS
════════════════════════════════════ */
let isPainting = false;

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  if (e.button === 2) { // ПКМ — перемещение
    isDragging = true;
    dragStart = {x: e.clientX, y: e.clientY};
    camStart = {x: camX, y: camY};
    canvas.style.cursor = 'grabbing';
    return;
  }

  if (e.button === 0) {
    const {cx, cy} = screenToCell(sx, sy);
    if (tool === 'draw' || tool === 'erase') {
      isPainting = true;
      paintCell(cx, cy);
      render();
    } else if (tool === 'fill') {
      if (cx >= 0 && cy >= 0 && cx < MAP_W && cy < MAP_H) {
        floodFill(cx, cy);
        render();
      }
    } else if (tool === 'rect') {
      const cc = clampCell(cx, cy);
      rectStart = cc;
      rectEnd = cc;
      isRectDragging = true;
    }
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  if (isDragging) {
    const dx = (e.clientX - dragStart.x) / (CELL * zoom);
    const dy = (e.clientY - dragStart.y) / (CELL * zoom);
    camX = camStart.x - dx;
    camY = camStart.y - dy;
    render();
    return;
  }

  const {cx, cy} = screenToCell(sx, sy);
  document.getElementById('tooltip').textContent =
    `X:${cx} Y:${cy}` + (cx >= 0 && cy >= 0 && cx < MAP_W && cy < MAP_H
      ? `  [${TILE_BY_ID[map[cy][cx].tile_type]?.name}  ${map[cy][cx].walkable ? '✓ проход' : '✗ блок'}]`
      : '');

  if (isPainting && (tool === 'draw' || tool === 'erase')) {
    paintCell(cx, cy);
    render();
  }

  if (isRectDragging && tool === 'rect') {
    rectEnd = clampCell(cx, cy);
    render();
  }
});

window.addEventListener('mouseup', e => {
  if (isDragging) {
    isDragging = false;
    canvas.style.cursor = 'crosshair';
  }
  if (isPainting) isPainting = false;
  if (isRectDragging && tool === 'rect' && rectStart && rectEnd) {
    isRectDragging = false;
    const ax = Math.min(rectStart.cx, rectEnd.cx);
    const ay = Math.min(rectStart.cy, rectEnd.cy);
    const bx = Math.max(rectStart.cx, rectEnd.cx);
    const by = Math.max(rectStart.cy, rectEnd.cy);
    applyRect(ax, ay, bx, by);
    rectStart = null; rectEnd = null;
    render();
  }
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  // zoom к курсору
  const {wx, wy} = screenToWorld(mx, my);
  const delta = e.deltaY > 0 ? -0.1 : 0.1;
  zoom = Math.min(6, Math.max(0.2, Math.round((zoom + delta) * 10) / 10));
  // recalc cam so wx,wy stays under cursor
  camX = wx - mx / (CELL * zoom);
  camY = wy - my / (CELL * zoom);
  render();
}, {passive: false});

/* ════════════════════════════════════
   TOOL & TILE UI
════════════════════════════════════ */
function setTool(t) {
  tool = t;
  ['draw','fill','rect','erase'].forEach(id => {
    document.getElementById(`tool-${id}`).classList.toggle('active', id === t);
  });
  if (t === 'rect') { rectStart = null; rectEnd = null; }
}

function setActiveTile(id) {
  activeTileId = id;
  const tile = TILE_BY_ID[id];
  customWalkable = tile.walkable; // default walkable для этого тайла
  renderTilesList();
  renderWalkableToggle();
}

function toggleWalkable() {
  customWalkable = !customWalkable;
  renderWalkableToggle();
}

function renderWalkableToggle() {
  const tog = document.getElementById('walkable-toggle');
  const hint = document.getElementById('walkable-hint');
  tog.classList.toggle('on', customWalkable);
  hint.textContent = customWalkable
    ? 'Персонаж может пройти через этот тайл'
    : 'Персонаж НЕ может пройти через тайл';
}

function renderTilesList() {
  const el = document.getElementById('tiles-list');
  el.innerHTML = '';
  TILES.forEach(t => {
    const d = document.createElement('div');
    d.className = 'tile-item' + (t.id === activeTileId ? ' active' : '');
    d.innerHTML = `
      <div class="tile-swatch" style="background:${t.color}">${t.icon}</div>
      <div class="tile-info">
        <div class="tile-name">${t.name}</div>
        <div class="tile-walk">${t.walkable ? '✓ проходим' : '✗ блокирует'}</div>
      </div>`;
    d.onclick = () => setActiveTile(t.id);
    el.appendChild(d);
  });
}

/* ════════════════════════════════════
   API — LOAD / SAVE
════════════════════════════════════ */
function setStatus(msg, type = 'load') {
  const el = document.getElementById('tb-status');
  el.textContent = msg;
  el.className = `tb-status ${type}`;
}

async function loadMap() {
  setStatus('ЗАГРУЗКА...', 'load');
  document.getElementById('btn-load').disabled = true;
  try {
    const res = await fetch(API_URL, {method: 'GET'});
    const data = await res.json();
    const tiles = typeof data === 'string' ? JSON.parse(data) : data;
    const list = tiles.tiles || tiles;

    if (list.length === 0) {
      setStatus('БД ПУСТА', 'load');
      document.getElementById('tb-info').textContent = 'Карта не сохранялась — рисуй и сохраняй!';
    } else {
      // apply to local map
      list.forEach(t => {
        if (t.x >= 0 && t.x < MAP_W && t.y >= 0 && t.y < MAP_H) {
          map[t.y][t.x] = {tile_type: t.tile_type, walkable: t.walkable, sprite_id: t.sprite_id};
        }
      });
      dirty.clear();
      setStatus(`ЗАГРУЖЕНО ${list.length}`, 'ok');
      document.getElementById('tb-info').textContent = `Загружено ${list.length} тайлов из БД`;
    }
  } catch(e) {
    setStatus('ОШИБКА', 'err');
  } finally {
    document.getElementById('btn-load').disabled = false;
    render();
  }
}

async function saveMap() {
  if (dirty.size === 0) { setStatus('НЕТ ИЗМЕНЕНИЙ', 'ok'); return; }
  setStatus('СОХРАНЕНИЕ...', 'load');
  document.getElementById('btn-save').disabled = true;

  const tiles = [...dirty].map(key => {
    const [x, y] = key.split(',').map(Number);
    const c = map[y][x];
    return {x, y, tile_type: c.tile_type, walkable: c.walkable, sprite_id: c.sprite_id};
  });

  try {
    // Батчами по 200
    const BATCH = 200;
    let saved = 0;
    for (let i = 0; i < tiles.length; i += BATCH) {
      const batch = tiles.slice(i, i + BATCH);
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({tiles: batch}),
      });
      const d = await res.json();
      const r = typeof d === 'string' ? JSON.parse(d) : d;
      saved += r.saved || batch.length;
    }
    dirty.clear();
    setStatus(`СОХРАНЕНО ${saved}`, 'ok');
    document.getElementById('tb-info').textContent = `Сохранено ${saved} тайлов в БД`;
  } catch(e) {
    setStatus('ОШИБКА СОХР.', 'err');
  } finally {
    document.getElementById('btn-save').disabled = false;
    render();
  }
}

function exportToGame() {
  // Сохраняем карту в localStorage для быстрого доступа из игры
  const compressed = [];
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const c = map[y][x];
      if (c.tile_type !== 0 || !c.walkable) {
        compressed.push({x, y, t: c.tile_type, w: c.walkable ? 1 : 0});
      }
    }
  }
  localStorage.setItem('gorodok_map_override', JSON.stringify(compressed));
  setStatus('→ ИГРА', 'ok');
  setTimeout(() => { window.location.href = 'gorodok-game.html'; }, 600);
}

async function confirmReset() {
  if (!confirm('Сбросить карту в БД и редакторе к дефолту (трава)?')) return;
  setStatus('СБРОС...', 'load');
  try {
    await fetch(API_URL + '?action=reset', {method: 'POST'});
    for (let y = 0; y < MAP_H; y++)
      for (let x = 0; x < MAP_W; x++)
        map[y][x] = {tile_type: 0, walkable: true, sprite_id: 'grass'};
    dirty.clear();
    setStatus('СБРОШЕНО', 'ok');
    render();
  } catch(e) {
    setStatus('ОШИБКА', 'err');
  }
}

/* ════════════════════════════════════
   KEYBOARD SHORTCUTS
════════════════════════════════════ */
document.addEventListener('keydown', e => {
  const map_keys = {
    'KeyB': 'draw', 'KeyF': 'fill', 'KeyR': 'rect', 'KeyE': 'erase',
  };
  if (map_keys[e.code]) setTool(map_keys[e.code]);
  if (e.code === 'KeyS' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); saveMap(); }
  // цифры 1-7 — быстрый выбор тайла
  const digit = parseInt(e.key);
  if (digit >= 1 && digit <= TILES.length) setActiveTile(digit - 1);
});

/* ════════════════════════════════════
   INIT
════════════════════════════════════ */
renderTilesList();
renderWalkableToggle();
resize();
// центрируем на карте
camX = -2; camY = -2;
render();

// Автозагрузка из БД
loadMap();
</script>
