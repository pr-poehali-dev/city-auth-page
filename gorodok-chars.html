<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Городок — Выбор персонажа</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#f5a623;--gold-lt:#ffd166;--gold-dk:#c47c10;
  --bg:#04060e;--panel:rgba(6,11,26,0.96);--border:rgba(245,166,35,0.35);
  --input-bg:rgba(8,16,40,0.95);--p2:'Press Start 2P',monospace;
}
html,body{width:100%;min-height:100vh;background:var(--bg);font-family:'VT323',monospace;color:#d4e8ff;overflow-x:hidden;}

/* ── BG GRID ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(245,166,35,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(245,166,35,0.03) 1px,transparent 1px);
  background-size:40px 40px;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 0%,rgba(245,166,35,0.06) 0%,transparent 70%);
}

/* ── HEADER ── */
header{
  text-align:center;padding:40px 20px 24px;position:relative;z-index:1;
}
.logo{
  font-family:var(--p2);font-size:22px;color:var(--gold);letter-spacing:6px;
  text-shadow:0 0 30px rgba(245,166,35,0.5),0 0 60px rgba(245,166,35,0.2);
  margin-bottom:10px;
}
.logo-sub{font-size:15px;color:rgba(245,166,35,0.5);letter-spacing:3px;}

/* ── MAIN LAYOUT ── */
.page{
  max-width:1100px;margin:0 auto;padding:0 20px 60px;
  display:grid;grid-template-columns:1fr 340px;gap:24px;
  position:relative;z-index:1;
}

/* ── CHARS GRID ── */
.section-title{
  font-family:var(--p2);font-size:8px;color:var(--gold);letter-spacing:2px;
  margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);
}
.chars-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  margin-bottom:16px;
}
.char-card{
  background:var(--panel);border:1.5px solid var(--border);
  padding:16px 12px;cursor:pointer;position:relative;
  transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:10px;
  min-height:200px;
}
.char-card:hover:not(.empty){
  border-color:var(--gold);
  box-shadow:0 0 20px rgba(245,166,35,0.15);
  transform:translateY(-2px);
}
.char-card.selected{
  border-color:var(--gold);
  box-shadow:0 0 0 1px var(--gold),0 0 24px rgba(245,166,35,0.2);
}
.char-card.empty{
  border-style:dashed;border-color:rgba(245,166,35,0.15);
  cursor:pointer;justify-content:center;
}
.char-card.empty:hover{border-color:rgba(245,166,35,0.4);background:rgba(245,166,35,0.03);}
.add-icon{font-size:28px;opacity:.3;margin-bottom:6px;}
.add-label{font-family:var(--p2);font-size:6px;color:rgba(245,166,35,0.3);letter-spacing:1px;}

/* avatar canvas per card */
.char-avatar{
  width:60px;height:80px;position:relative;
  image-rendering:pixelated;
}
.char-avatar canvas{display:block;}

.char-name{font-family:var(--p2);font-size:8px;color:var(--gold);text-align:center;letter-spacing:1px;}
.char-meta{font-size:13px;color:rgba(180,200,240,0.6);text-align:center;line-height:1.5;}
.char-class-badge{
  font-family:var(--p2);font-size:5.5px;letter-spacing:1px;
  padding:3px 7px;border:1px solid;margin-top:2px;
}
.char-bars{width:100%;display:flex;flex-direction:column;gap:4px;}
.cbar{height:5px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.06);}
.cbar-fill{height:100%;}
.char-slot-num{
  position:absolute;top:7px;left:9px;
  font-family:var(--p2);font-size:5px;color:rgba(245,166,35,0.3);
}
.char-del{
  position:absolute;top:6px;right:7px;
  background:none;border:none;color:rgba(255,80,80,0.35);cursor:pointer;
  font-size:14px;padding:2px 4px;transition:color .12s;line-height:1;
}
.char-del:hover{color:rgba(255,80,80,0.85);}
.selected-mark{
  position:absolute;top:-1px;left:-1px;right:-1px;
  background:var(--gold);height:2px;
}

/* ── ENTER BUTTON ── */
.enter-btn{
  width:100%;padding:14px;
  background:linear-gradient(180deg,var(--gold-lt),var(--gold));
  border:2px solid var(--gold-dk);color:#120800;
  font-family:var(--p2);font-size:9px;letter-spacing:3px;cursor:pointer;
  transition:all .15s;
  box-shadow:0 4px 20px rgba(245,166,35,0.3);
}
.enter-btn:hover{box-shadow:0 6px 28px rgba(245,166,35,0.5);transform:translateY(-1px);}
.enter-btn:active{transform:translateY(1px);}
.enter-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;}

/* ── RIGHT PANEL: CREATE / DETAIL ── */
.side-panel{display:flex;flex-direction:column;gap:16px;}
.panel-box{background:var(--panel);border:1.5px solid var(--border);padding:18px;}

/* CLASS SELECTOR */
.class-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.class-btn{
  background:rgba(0,0,0,0.4);border:1.5px solid rgba(245,166,35,0.2);
  padding:10px 8px;cursor:pointer;transition:all .15s;text-align:center;
}
.class-btn:hover{border-color:rgba(245,166,35,0.5);}
.class-btn.active{border-color:var(--gold);background:rgba(245,166,35,0.08);}
.class-btn .ci{font-size:20px;display:block;margin-bottom:4px;}
.class-btn .cn{font-family:var(--p2);font-size:6px;color:var(--gold);display:block;}
.class-btn .cd{font-size:12px;color:rgba(180,200,240,0.5);display:block;margin-top:2px;}

/* COLOR PICKER */
.color-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.color-dot{
  width:26px;height:26px;border:2px solid transparent;cursor:pointer;
  transition:all .15s;position:relative;
}
.color-dot:hover{transform:scale(1.15);}
.color-dot.active{border-color:#fff;box-shadow:0 0 8px currentColor;}

/* STAT SLIDERS */
.stat-sliders{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
.stat-slide-row{display:flex;flex-direction:column;gap:4px;}
.stat-slide-lbl{display:flex;justify-content:space-between;align-items:center;}
.stat-slide-lbl span:first-child{font-family:var(--p2);font-size:6px;color:rgba(245,166,35,0.6);}
.stat-slide-lbl span:last-child{font-size:13px;color:var(--gold);}
.stat-track{height:6px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.07);position:relative;cursor:pointer;}
.stat-fill{height:100%;transition:width .2s;}
.pts-left{font-family:var(--p2);font-size:6px;color:rgba(245,166,35,0.5);text-align:right;margin-top:4px;}

/* NAME INPUT */
.name-input{
  width:100%;background:var(--input-bg);border:1.5px solid rgba(42,111,219,0.3);
  padding:10px 12px;font-family:'VT323',monospace;font-size:22px;color:#d4e8ff;
  outline:none;caret-color:var(--gold);margin-top:10px;letter-spacing:1px;
}
.name-input:focus{border-color:#2a6fdb;}
.name-err{font-family:var(--p2);font-size:6px;color:#ff5252;margin-top:6px;min-height:14px;}

.create-btn{
  width:100%;margin-top:12px;padding:12px;
  background:linear-gradient(180deg,rgba(42,111,219,0.3),rgba(20,60,160,0.3));
  border:1.5px solid rgba(42,111,219,0.5);color:#a0c8ff;
  font-family:var(--p2);font-size:7px;letter-spacing:2px;cursor:pointer;transition:all .15s;
}
.create-btn:hover{border-color:#2a6fdb;color:#d4e8ff;box-shadow:0 0 14px rgba(42,111,219,0.3);}

/* ── DETAIL PANEL ── */
.detail-avatar{display:flex;justify-content:center;margin-bottom:12px;}
.detail-stats{display:flex;flex-direction:column;gap:6px;}
.dstat{display:flex;justify-content:space-between;font-size:15px;}
.dstat span:first-child{color:rgba(180,200,240,0.5);}
.dstat span:last-child{color:var(--gold);}
.dbar-row{display:flex;flex-direction:column;gap:3px;margin-top:2px;}
.dbar-lbl{font-family:var(--p2);font-size:5px;color:rgba(245,166,35,0.45);}
.dbar{height:7px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.07);}
.dbar-fill{height:100%;}

/* PREVIEW CANVAS */
#preview-canvas{display:block;margin:0 auto;image-rendering:pixelated;}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:rgba(5,10,24,0.95);border:1.5px solid var(--gold);
  padding:10px 22px;font-family:var(--p2);font-size:7px;color:var(--gold);
  letter-spacing:2px;display:none;z-index:200;white-space:nowrap;
  box-shadow:0 0 20px rgba(245,166,35,0.3);
}
</style>
</head>
<body>

<header>
  <div class="logo">⬡ ГОРОДОК</div>
  <div class="logo-sub">ВЫБОР ПЕРСОНАЖА</div>
</header>

<div class="page">

  <!-- LEFT: CHAR SLOTS -->
  <div>
    <div class="section-title">▸ СЛОТЫ ПЕРСОНАЖЕЙ (макс. 6)</div>
    <div class="chars-grid" id="chars-grid"></div>
    <button class="enter-btn" id="enter-btn" disabled onclick="enterGame()">▶ ВОЙТИ В ИГРУ</button>
  </div>

  <!-- RIGHT: SIDE PANELS -->
  <div class="side-panel">

    <!-- CREATE FORM -->
    <div class="panel-box" id="create-panel">
      <div class="section-title">✦ СОЗДАТЬ ПЕРСОНАЖА</div>

      <!-- Name -->
      <div style="font-family:var(--p2);font-size:6px;color:rgba(245,166,35,0.55);letter-spacing:1px;">ИМЯ ПЕРСОНАЖА</div>
      <input class="name-input" id="char-name-inp" placeholder="Введите имя..." maxlength="14"
        oninput="onNameInput()" onkeydown="if(event.key==='Enter')createChar()">
      <div class="name-err" id="name-err"></div>

      <!-- Class -->
      <div style="font-family:var(--p2);font-size:6px;color:rgba(245,166,35,0.55);letter-spacing:1px;margin-top:14px;">КЛАСС</div>
      <div class="class-grid" id="class-grid"></div>

      <!-- Color -->
      <div style="font-family:var(--p2);font-size:6px;color:rgba(245,166,35,0.55);letter-spacing:1px;margin-top:14px;">ЦВЕТ ПЕРСОНАЖА</div>
      <div class="color-row" id="color-row"></div>

      <!-- Stats -->
      <div style="font-family:var(--p2);font-size:6px;color:rgba(245,166,35,0.55);letter-spacing:1px;margin-top:14px;">РАСПРЕДЕЛЕНИЕ ОЧКОВ <span style="color:var(--gold)" id="pts-left-top"></span></div>
      <div class="stat-sliders" id="stat-sliders"></div>
      <div class="pts-left" id="pts-display"></div>

      <!-- Preview -->
      <div style="margin-top:14px;text-align:center;">
        <canvas id="preview-canvas" width="80" height="100"></canvas>
      </div>

      <button class="create-btn" id="create-btn" onclick="createChar()">+ СОЗДАТЬ</button>
    </div>

    <!-- DETAIL PANEL (shown when char selected) -->
    <div class="panel-box" id="detail-panel" style="display:none;">
      <div class="section-title" id="detail-title">▸ ПЕРСОНАЖ</div>
      <div class="detail-avatar">
        <canvas id="detail-canvas" width="80" height="100" style="image-rendering:pixelated;display:block;"></canvas>
      </div>
      <div class="detail-stats" id="detail-stats"></div>
      <button class="create-btn" style="margin-top:12px;border-color:rgba(255,80,80,0.3);color:#ff8080;" onclick="deleteSelected()">🗑 УДАЛИТЬ ПЕРСОНАЖА</button>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

/* ══════════════════════════════════
   CLASSES
══════════════════════════════════ */
const CLASSES=[
  {id:'warrior', icon:'⚔️', name:'Воин',     desc:'Сила и защита', color:'#e83030',
   base:{hp:130,speed:1.8,str:8,def:6,agi:3}, bonus:'⚔ Урон +30%'},
  {id:'rogue',   icon:'🗡️', name:'Разбойник',desc:'Быстрый и ловкий',color:'#20c060',
   base:{hp:90, speed:2.8,str:5,def:3,agi:10},bonus:'🥷 Скорость +40%'},
  {id:'medic',   icon:'🩺', name:'Медик',    desc:'Лечение и поддержка',color:'#3a8fff',
   base:{hp:100,speed:2.0,str:3,def:5,agi:5},bonus:'💊 Лечение x2'},
  {id:'engineer',icon:'🔧', name:'Инженер',  desc:'Умный и богатый',color:'#c060e0',
   base:{hp:100,speed:2.2,str:4,def:4,agi:6},bonus:'💰 Деньги +50%'},
];

const COLORS=['#f5a623','#3a8fff','#e83060','#20c060','#c060e0','#60d0e0','#ff8c42','#a0c8ff'];

/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
const MAX_CHARS=6;
const STAT_POINTS=15; // очков на распределение
let chars=[];         // массив созданных персонажей
let selectedId=null;  // выбранный для входа
let form={
  name:'',
  classId:'warrior',
  color:COLORS[0],
  stats:{str:5,def:3,agi:3}, // распределяемые поверх базы
};

function loadChars(){
  try{chars=JSON.parse(localStorage.getItem('gorodok_chars')||'[]');}
  catch{chars=[];}
}
function saveChars(){localStorage.setItem('gorodok_chars',JSON.stringify(chars));}

/* ══════════════════════════════════
   DRAW PIXEL CHARACTER (canvas)
══════════════════════════════════ */
function drawPixelChar(canvas,color,classId,scale=4){
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);

  const cx=w/2,cy=h-10;
  const s=scale;

  // shadow
  ctx.globalAlpha=.3;ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.beginPath();ctx.ellipse(cx,cy,8*s*.5,2*s*.5,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  // legs
  const lc=color==='#f5a623'?'#2a3a5a':'#1a1a2a';
  ctx.fillStyle=lc;
  ctx.fillRect(cx-s*1.2,cy-s*4,s*1.1,s*2.2);
  ctx.fillRect(cx+s*.1,cy-s*4,s*1.1,s*2.2);
  ctx.fillStyle='#0a0a14';
  ctx.fillRect(cx-s*1.2,cy-s*2,s*1.1,s*.8);
  ctx.fillRect(cx+s*.1,cy-s*2,s*1.1,s*.8);

  // body
  ctx.fillStyle=color;
  ctx.fillRect(cx-s*1.3,cy-s*7,s*2.6,s*2.8);
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.fillRect(cx-s*1.3,cy-s*5.2,s*2.6,s*1);

  // arms
  ctx.fillStyle=color;
  ctx.fillRect(cx-s*2.1,cy-s*7,s*.9,s*2);
  ctx.fillRect(cx+s*1.2,cy-s*7,s*.9,s*2);

  // head
  ctx.fillStyle='#e8c090';
  ctx.fillRect(cx-s*1.1,cy-s*9.5,s*2.2,s*2.2);

  // eyes
  ctx.fillStyle='#1a0a00';
  ctx.fillRect(cx-s*.7,cy-s*9,s*.5,s*.5);
  ctx.fillRect(cx+s*.2,cy-s*9,s*.5,s*.5);

  // hair / hat by class
  const hairCols={warrior:'#4a1010',rogue:'#1a1a1a',medic:'#dde8ff',engineer:'#6030a0'};
  ctx.fillStyle=hairCols[classId]||'#3a2008';
  ctx.fillRect(cx-s*1.1,cy-s*9.5,s*2.2,s*.7);

  // class accessory
  if(classId==='warrior'){
    // shield
    ctx.fillStyle='#8a2020';ctx.fillRect(cx+s*1.2,cy-s*7.5,s*.7,s*1.8);
    ctx.fillStyle='#c04040';ctx.fillRect(cx+s*1.35,cy-s*7.2,s*.4,s*.4);
  }
  if(classId==='medic'){
    // cross on body
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.fillRect(cx-s*.2,cy-s*6.8,s*.5,s*1.4);
    ctx.fillRect(cx-s*.6,cy-s*6.3,s*1.3,s*.5);
  }
  if(classId==='rogue'){
    // hood shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(cx-s*1.1,cy-s*9.5,s*2.2,s*1.4);
  }
  if(classId==='engineer'){
    // goggles
    ctx.fillStyle='rgba(100,50,200,0.5)';
    ctx.fillRect(cx-s*.9,cy-s*8.8,s*.6,s*.4);ctx.fillRect(cx+s*.3,cy-s*8.8,s*.6,s*.4);
  }
}

/* ══════════════════════════════════
   RENDER CHARS GRID
══════════════════════════════════ */
function renderGrid(){
  const grid=document.getElementById('chars-grid');
  grid.innerHTML='';

  for(let i=0;i<MAX_CHARS;i++){
    const ch=chars[i]||null;
    const card=document.createElement('div');
    card.className='char-card'+(ch?'':' empty')+(selectedId===ch?.id?' selected':'');

    if(ch){
      const cls=CLASSES.find(c=>c.id===ch.classId)||CLASSES[0];
      const sel=selectedId===ch.id;
      card.innerHTML=`
        ${sel?'<div class="selected-mark"></div>':''}
        <span class="char-slot-num">#${i+1}</span>
        <button class="char-del" data-id="${ch.id}" title="Удалить">✕</button>
        <div class="char-avatar"><canvas width="80" height="90" data-id="${ch.id}"></canvas></div>
        <div class="char-name">${ch.name}</div>
        <div class="char-meta">
          <span class="char-class-badge" style="color:${cls.color};border-color:${cls.color}40">${cls.icon} ${cls.name}</span><br>
          Ур. ${ch.level} &nbsp;•&nbsp; ${ch.hp}/${ch.maxHp} HP
        </div>
        <div class="char-bars">
          <div class="cbar"><div class="cbar-fill" style="width:${ch.hp/ch.maxHp*100}%;background:${cls.color}"></div></div>
          <div class="cbar"><div class="cbar-fill" style="width:${ch.xp/100*100}%;background:#3a8fff"></div></div>
        </div>`;
      card.onclick=(e)=>{
        if(e.target.closest('.char-del'))return;
        selectChar(ch.id);
      };
      card.querySelector('.char-del').onclick=(e)=>{
        e.stopPropagation();
        confirmDelete(ch.id,ch.name);
      };
    } else {
      card.innerHTML=`<div class="add-icon">＋</div><div class="add-label">СОЗДАТЬ</div>`;
      card.onclick=()=>{
        document.getElementById('char-name-inp').focus();
        document.getElementById('create-panel').scrollIntoView({behavior:'smooth'});
      };
    }
    grid.appendChild(card);
  }

  // Draw avatars
  grid.querySelectorAll('canvas[data-id]').forEach(c=>{
    const ch=chars.find(x=>x.id===c.dataset.id);
    if(ch) drawPixelChar(c,ch.color,ch.classId,3.2);
  });

  document.getElementById('enter-btn').disabled=!selectedId;
}

/* ══════════════════════════════════
   SELECT CHAR
══════════════════════════════════ */
function selectChar(id){
  selectedId=(selectedId===id)?null:id;
  renderGrid();
  updateDetailPanel();
}

function updateDetailPanel(){
  const dp=document.getElementById('detail-panel');
  const cp=document.getElementById('create-panel');
  if(!selectedId){dp.style.display='none';cp.style.display='block';return;}
  const ch=chars.find(c=>c.id===selectedId);
  if(!ch){dp.style.display='none';return;}
  const cls=CLASSES.find(c=>c.id===ch.classId)||CLASSES[0];
  cp.style.display='none';dp.style.display='block';
  document.getElementById('detail-title').textContent=`▸ ${ch.name}`;
  const dc=document.getElementById('detail-canvas');
  drawPixelChar(dc,ch.color,ch.classId,3.5);
  document.getElementById('detail-stats').innerHTML=`
    <div class="dstat"><span>${cls.icon} Класс</span><span style="color:${cls.color}">${cls.name}</span></div>
    <div class="dstat"><span>⭐ Уровень</span><span>${ch.level}</span></div>
    <div class="dstat"><span>💰 Деньги</span><span>${ch.gold} руб.</span></div>
    <div class="dstat"><span>🎮 Сыграно</span><span>${ch.playtime||0} мин.</span></div>
    <div class="dbar-row">
      <div class="dbar-lbl">HP</div>
      <div class="dbar"><div class="dbar-fill" style="width:${ch.hp/ch.maxHp*100}%;background:${cls.color}"></div></div>
    </div>
    <div class="dbar-row">
      <div class="dbar-lbl">XP</div>
      <div class="dbar"><div class="dbar-fill" style="width:${ch.xp}%;background:#3a8fff"></div></div>
    </div>
    <div class="dbar-row">
      <div class="dbar-lbl">СИЛ</div>
      <div class="dbar"><div class="dbar-fill" style="width:${(ch.str/15)*100}%;background:#e83030"></div></div>
    </div>
    <div class="dbar-row">
      <div class="dbar-lbl">ЛОВ</div>
      <div class="dbar"><div class="dbar-fill" style="width:${(ch.agi/15)*100}%;background:#20c060"></div></div>
    </div>
    <div class="dbar-row">
      <div class="dbar-lbl">ЗАЩ</div>
      <div class="dbar"><div class="dbar-fill" style="width:${(ch.def/15)*100}%;background:#3a8fff"></div></div>
    </div>
    <div style="margin-top:8px;padding:8px;background:rgba(245,166,35,0.06);border:1px solid rgba(245,166,35,0.2);font-size:13px;color:rgba(245,166,35,0.7);">${cls.bonus}</div>
  `;
}

/* ══════════════════════════════════
   CLASS GRID
══════════════════════════════════ */
function renderClassGrid(){
  const g=document.getElementById('class-grid');
  g.innerHTML='';
  CLASSES.forEach(cls=>{
    const b=document.createElement('div');
    b.className='class-btn'+(form.classId===cls.id?' active':'');
    b.innerHTML=`<span class="ci">${cls.icon}</span><span class="cn">${cls.name}</span><span class="cd">${cls.desc}</span>`;
    b.onclick=()=>{form.classId=cls.id;renderClassGrid();renderPreview();renderStatSliders();};
    g.appendChild(b);
  });
}

/* ══════════════════════════════════
   COLOR PICKER
══════════════════════════════════ */
function renderColorPicker(){
  const r=document.getElementById('color-row');
  r.innerHTML='';
  COLORS.forEach(c=>{
    const d=document.createElement('div');
    d.className='color-dot'+(form.color===c?' active':'');
    d.style.background=c;d.style.color=c;
    d.onclick=()=>{form.color=c;renderColorPicker();renderPreview();};
    r.appendChild(d);
  });
}

/* ══════════════════════════════════
   STAT SLIDERS
══════════════════════════════════ */
const STAT_DEFS=[
  {key:'str',label:'Сила',    color:'#e83030'},
  {key:'agi',label:'Ловкость',color:'#20c060'},
  {key:'def',label:'Защита',  color:'#3a8fff'},
];
function ptsUsed(){return form.stats.str+form.stats.agi+form.stats.def;}
function ptsLeft(){return STAT_POINTS-ptsUsed();}

function renderStatSliders(){
  const sl=document.getElementById('stat-sliders');
  sl.innerHTML='';
  const cls=CLASSES.find(c=>c.id===form.classId)||CLASSES[0];

  STAT_DEFS.forEach(({key,label,color})=>{
    const total=cls.base[key]+form.stats[key];
    const maxTotal=cls.base[key]+STAT_POINTS;
    const pct=total/maxTotal*100;

    const row=document.createElement('div');
    row.className='stat-slide-row';
    row.innerHTML=`
      <div class="stat-slide-lbl">
        <span>${label} (база ${cls.base[key]})</span>
        <span style="color:${color}">${total}</span>
      </div>
      <div class="stat-track" data-key="${key}">
        <div class="stat-fill" style="width:${pct}%;background:${color}"></div>
      </div>`;

    const track=row.querySelector('.stat-track');
    // Click / drag on track
    function handleTrack(e){
      const rect=track.getBoundingClientRect();
      const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
      const val=Math.round(pct*STAT_POINTS);
      const old=form.stats[key];
      const diff=val-old;
      if(diff>0&&ptsLeft()<diff)form.stats[key]=old+ptsLeft();
      else if(diff<0)form.stats[key]=Math.max(0,val);
      else form.stats[key]=val;
      renderStatSliders();
    }
    track.addEventListener('mousedown',e=>{handleTrack(e);
      const up=()=>document.removeEventListener('mousemove',handleTrack);
      document.addEventListener('mousemove',handleTrack);
      document.addEventListener('mouseup',up,{once:true});
    });

    sl.appendChild(row);
  });

  const left=ptsLeft();
  document.getElementById('pts-display').textContent=`Осталось очков: ${left}`;
  document.getElementById('pts-left-top').textContent=`[${left} / ${STAT_POINTS}]`;
}

/* ══════════════════════════════════
   PREVIEW
══════════════════════════════════ */
function renderPreview(){
  const c=document.getElementById('preview-canvas');
  drawPixelChar(c,form.color,form.classId,3.5);
}

/* ══════════════════════════════════
   NAME INPUT
══════════════════════════════════ */
function onNameInput(){
  form.name=document.getElementById('char-name-inp').value.trim();
  document.getElementById('name-err').textContent='';
}

/* ══════════════════════════════════
   CREATE CHARACTER
══════════════════════════════════ */
function createChar(){
  const name=document.getElementById('char-name-inp').value.trim();
  if(!name){document.getElementById('name-err').textContent='Введите имя персонажа';return;}
  if(name.length<2){document.getElementById('name-err').textContent='Минимум 2 символа';return;}
  if(chars.some(c=>c.name.toLowerCase()===name.toLowerCase())){
    document.getElementById('name-err').textContent='Такое имя уже занято';return;
  }
  if(chars.length>=MAX_CHARS){showToast('Максимум 6 персонажей');return;}

  const cls=CLASSES.find(c=>c.id===form.classId)||CLASSES[0];
  const str=cls.base.str+form.stats.str;
  const agi=cls.base.agi+form.stats.agi;
  const def=cls.base.def+form.stats.def;

  const ch={
    id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    name,
    classId:form.classId,
    color:form.color,
    level:1,xp:0,
    hp:cls.base.hp,maxHp:cls.base.hp,
    gold:form.classId==='engineer'?375:250,
    speed:cls.base.speed,
    str,agi,def,
    inventory:new Array(20).fill(null),
    playtime:0,
    createdAt:Date.now(),
  };
  // Стартовая аптечка
  ch.inventory[0]={id:'medkit',name:'Аптечка',icon:'🩹',desc:'Восстанавливает 30 HP.',usable:true};

  chars.push(ch);
  saveChars();
  selectedId=ch.id;
  // Reset form
  form={name:'',classId:'warrior',color:COLORS[0],stats:{str:5,def:3,agi:3}};
  document.getElementById('char-name-inp').value='';
  document.getElementById('name-err').textContent='';
  renderClassGrid();renderColorPicker();renderStatSliders();renderPreview();
  renderGrid();updateDetailPanel();
  showToast(`${ch.name} создан!`);
}

/* ══════════════════════════════════
   DELETE
══════════════════════════════════ */
function confirmDelete(id,name){
  if(!confirm(`Удалить персонажа «${name}»? Это действие нельзя отменить.`))return;
  deleteChar(id);
}
function deleteSelected(){
  if(!selectedId)return;
  const ch=chars.find(c=>c.id===selectedId);
  if(ch)confirmDelete(selectedId,ch.name);
}
function deleteChar(id){
  chars=chars.filter(c=>c.id!==id);
  if(selectedId===id){selectedId=null;}
  saveChars();renderGrid();updateDetailPanel();
  document.getElementById('create-panel').style.display='block';
  document.getElementById('detail-panel').style.display='none';
  showToast('Персонаж удалён');
}

/* ══════════════════════════════════
   ENTER GAME
══════════════════════════════════ */
function enterGame(){
  if(!selectedId)return;
  const ch=chars.find(c=>c.id===selectedId);
  if(!ch)return;
  // Обновляем время последней игры
  ch.lastPlayed=Date.now();
  saveChars();
  // Передаём ID выбранного персонажа
  localStorage.setItem('gorodok_active_char',selectedId);
  // Переход в игру
  window.location.href='gorodok-game.html';
}

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.style.display='none',2400);
}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
loadChars();
renderGrid();
renderClassGrid();
renderColorPicker();
renderStatSliders();
renderPreview();
// Если пришли обратно из игры — авто-выбрать последнего
const lastActive=localStorage.getItem('gorodok_active_char');
if(lastActive&&chars.find(c=>c.id===lastActive)){
  selectedId=lastActive;renderGrid();updateDetailPanel();
}
</script>
