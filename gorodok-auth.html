<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Городок — Авторизация</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold:      #f5a623;
    --gold-lt:   #ffd166;
    --gold-dk:   #c47c10;
    --orange:    #e8702a;
    --blue-glow: #2a6fdb;
    --form-bg:   rgba(6,12,28,0.88);
    --border:    rgba(245,166,35,0.4);
    --input-bg:  rgba(10,20,50,0.7);
    --err:       #ff5252;
    --ok:        #69f0ae;
  }
  html, body { width:100%; height:100%; overflow:hidden; background:#05090f; }
  #world { position:fixed; inset:0; image-rendering:pixelated; }
  .overlay {
    position:fixed; inset:0; pointer-events:none;
    background:linear-gradient(to bottom,rgba(0,0,0,0) 0%,rgba(0,0,0,0.1) 55%,rgba(0,0,0,0.6) 100%);
  }
  .page {
    position:fixed; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  }
  .logo { display:flex; flex-direction:column; align-items:center; gap:7px; filter:drop-shadow(0 0 20px rgba(245,166,35,0.55)); animation:fadeUp 1s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:translateY(0)} }
  .logo-title { font-family:'Press Start 2P',monospace; font-size:30px; color:var(--gold); letter-spacing:6px; text-shadow:0 0 14px var(--gold),0 0 32px var(--orange),2px 2px 0 #1a0a00; }
  .logo-sub { font-family:'VT323',monospace; font-size:15px; color:rgba(245,166,35,0.55); letter-spacing:8px; text-transform:uppercase; }
  .card {
    width:420px; background:var(--form-bg); border:2px solid var(--border); border-radius:8px;
    backdrop-filter:blur(16px); position:relative; overflow:hidden;
    box-shadow:0 0 0 1px rgba(245,166,35,0.08),0 10px 48px rgba(0,0,0,0.75),0 0 70px rgba(42,111,219,0.1),inset 0 1px 0 rgba(255,255,255,0.04);
    animation:fadeUp 1s 0.15s ease both;
  }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); opacity:.65; }
  .tabs { display:flex; border-bottom:2px solid rgba(245,166,35,0.18); }
  .tab { flex:1; padding:15px; background:none; border:none; cursor:pointer; font-family:'Press Start 2P',monospace; font-size:8px; letter-spacing:1px; color:rgba(245,166,35,0.4); transition:color .2s,background .2s; position:relative; }
  .tab:hover { color:var(--gold-lt); background:rgba(245,166,35,0.04); }
  .tab.active { color:var(--gold); background:rgba(245,166,35,0.06); }
  .tab.active::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:2px; background:var(--gold); box-shadow:0 0 8px var(--gold); }
  .panel { display:none; padding:26px; }
  .panel.active { display:block; }
  .field { margin-bottom:18px; position:relative; }
  .field label { display:block; margin-bottom:6px; font-family:'Press Start 2P',monospace; font-size:7px; color:rgba(245,166,35,0.6); letter-spacing:1px; }
  .field input { width:100%; padding:10px 13px; background:var(--input-bg); border:2px solid rgba(42,111,219,0.28); border-radius:4px; font-family:'VT323',monospace; font-size:20px; color:#d4e8ff; outline:none; transition:border-color .2s,box-shadow .2s; caret-color:var(--gold); }
  .field input::placeholder { color:rgba(100,140,200,0.3); font-size:18px; }
  .field input:focus { border-color:var(--blue-glow); box-shadow:0 0 0 3px rgba(42,111,219,0.14),0 0 12px rgba(42,111,219,0.18); }
  .field input.err { border-color:var(--err); box-shadow:0 0 0 3px rgba(255,82,82,0.1); }
  .field input.ok  { border-color:rgba(105,240,174,0.45); }
  .field .msg { position:absolute; bottom:-15px; left:0; font-family:'VT323',monospace; font-size:14px; color:var(--err); opacity:0; transition:opacity .2s; }
  .field .msg.visible { opacity:1; }
  .forgot { display:block; text-align:right; font-family:'VT323',monospace; font-size:15px; color:rgba(100,160,255,0.5); text-decoration:none; margin-top:-8px; margin-bottom:18px; transition:color .2s; }
  .forgot:hover { color:rgba(120,180,255,0.85); }
  .btn { width:100%; padding:12px; font-family:'Press Start 2P',monospace; font-size:9px; letter-spacing:2px; color:#120800; background:linear-gradient(180deg,var(--gold-lt) 0%,var(--gold) 50%,var(--gold-dk) 100%); border:2px solid var(--gold); border-radius:4px; cursor:pointer; box-shadow:0 0 16px rgba(245,166,35,0.38),inset 0 1px 0 rgba(255,255,255,0.28),inset 0 -2px 0 rgba(0,0,0,0.18); transition:all .15s; }
  .btn:hover { background:linear-gradient(180deg,#ffe599 0%,var(--gold-lt) 50%,var(--gold) 100%); box-shadow:0 0 28px rgba(245,166,35,0.62); transform:translateY(-1px); }
  .btn:active { transform:translateY(1px); }
  .btn::after { content:'▶'; margin-left:10px; font-size:7px; }
  .status { text-align:center; margin-top:13px; font-family:'VT323',monospace; font-size:17px; min-height:21px; letter-spacing:1px; }
  .status.success { color:var(--ok); }
  .status.fail    { color:var(--err); }
  .server-badge { display:flex; align-items:center; gap:8px; font-family:'VT323',monospace; font-size:13px; color:rgba(105,240,174,0.45); letter-spacing:2px; }
  .pulse-dot { width:5px; height:5px; background:#69f0ae; animation:pdot 2s infinite; }
  @keyframes pdot { 0%,100%{opacity:1} 50%{opacity:.25} }
</style>
</head>
<body>
<canvas id="world"></canvas>
<div class="overlay"></div>
<div class="page">
  <div class="logo">
    <div class="logo-title">ГОРОДОК</div>
    <div class="logo-sub">• город в лесу •</div>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">⬛ ВХОД</button>
      <button class="tab" onclick="switchTab('register')">✦ РЕГИСТРАЦИЯ</button>
    </div>
    <div class="panel active" id="panel-login">
      <div class="field">
        <label>ЛОГИН</label>
        <input type="text" id="l-login" placeholder="ваш никнейм..." autocomplete="username"
          oninput="validate('l-login','msg-l-login',v=>v.length>=3?'':'минимум 3 символа')">
        <span class="msg" id="msg-l-login"></span>
      </div>
      <div class="field">
        <label>ПАРОЛЬ</label>
        <input type="password" id="l-pass" placeholder="секретный код..." autocomplete="current-password"
          oninput="validate('l-pass','msg-l-pass',v=>v.length>=4?'':'минимум 4 символа')">
        <span class="msg" id="msg-l-pass"></span>
      </div>
      <a class="forgot" href="#">Забыли пароль?</a>
      <button class="btn" onclick="submitLogin()">ВОЙТИ</button>
      <div class="status" id="status-login"></div>
    </div>
    <div class="panel" id="panel-register">
      <div class="field">
        <label>ЛОГИН</label>
        <input type="text" id="r-login" placeholder="придумайте ник..."
          oninput="validate('r-login','msg-r-login',v=>v.length>=3?'':'минимум 3 символа')">
        <span class="msg" id="msg-r-login"></span>
      </div>
      <div class="field">
        <label>EMAIL</label>
        <input type="email" id="r-email" placeholder="почта@домен.ru"
          oninput="validate('r-email','msg-r-email',v=>/^[^@]+@[^@]+\.[^@]+$/.test(v)?'':'неверный формат')">
        <span class="msg" id="msg-r-email"></span>
      </div>
      <div class="field">
        <label>ПАРОЛЬ</label>
        <input type="password" id="r-pass" placeholder="надёжный пароль..."
          oninput="validate('r-pass','msg-r-pass',v=>v.length>=6?'':'минимум 6 символов')">
        <span class="msg" id="msg-r-pass"></span>
      </div>
      <div class="field" style="margin-bottom:22px">
        <label>ПОВТОРИТЕ ПАРОЛЬ</label>
        <input type="password" id="r-pass2" placeholder="ещё раз..." oninput="validateConfirm()">
        <span class="msg" id="msg-r-pass2"></span>
      </div>
      <button class="btn" onclick="submitRegister()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
      <div class="status" id="status-register"></div>
    </div>
  </div>
  <div class="server-badge">
    <div class="pulse-dot"></div>СЕРВЕР ОНЛАЙН<div class="pulse-dot"></div>
  </div>
</div>

<script>
/* ── TABS ── */
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('panel-login').classList.toggle('active',tab==='login');
  document.getElementById('panel-register').classList.toggle('active',tab==='register');
}
/* ── VALIDATION ── */
function validate(id,mid,fn) {
  const inp=document.getElementById(id), msg=document.getElementById(mid);
  const err=fn(inp.value.trim());
  inp.classList.toggle('err',!!err&&inp.value.length>0);
  inp.classList.toggle('ok',!err&&inp.value.length>0);
  msg.textContent=err; msg.classList.toggle('visible',!!err&&inp.value.length>0);
  return !err;
}
function validateConfirm() {
  const p1=document.getElementById('r-pass').value, p2=document.getElementById('r-pass2');
  const msg=document.getElementById('msg-r-pass2'), err=p2.value!==p1?'пароли не совпадают':'';
  p2.classList.toggle('err',!!err&&p2.value.length>0); p2.classList.toggle('ok',!err&&p2.value.length>0);
  msg.textContent=err; msg.classList.toggle('visible',!!err&&p2.value.length>0);
  return !err&&p2.value.length>0;
}
function submitLogin() {
  const ok=validate('l-login','msg-l-login',v=>v.length>=3?'':'минимум 3 символа')
         &validate('l-pass','msg-l-pass',v=>v.length>=4?'':'минимум 4 символа');
  const st=document.getElementById('status-login');
  if(!ok){st.textContent='✖ исправьте ошибки';st.className='status fail';return;}
  st.textContent='...';st.className='status';
  setTimeout(()=>{console.log('Вход выполнен',{login:document.getElementById('l-login').value});
    st.textContent='✔ Добро пожаловать в Городок!';st.className='status success';},600);
}
function submitRegister() {
  const ok=validate('r-login','msg-r-login',v=>v.length>=3?'':'минимум 3 символа')
          &validate('r-email','msg-r-email',v=>/^[^@]+@[^@]+\.[^@]+$/.test(v)?'':'неверный формат')
          &validate('r-pass','msg-r-pass',v=>v.length>=6?'':'минимум 6 символов')
          &validateConfirm();
  const st=document.getElementById('status-register');
  if(!ok){st.textContent='✖ исправьте ошибки';st.className='status fail';return;}
  st.textContent='...';st.className='status';
  setTimeout(()=>{console.log('Регистрация выполнена',{login:document.getElementById('r-login').value,email:document.getElementById('r-email').value});
    st.textContent='✔ Регистрация выполнена!';st.className='status success';},700);
}

/* ══════════════════════════════════════════════════
   PIXEL WORLD — MODERN CITY IN THE FOREST
══════════════════════════════════════════════════ */
(function(){
const C=document.getElementById('world');
const ctx=C.getContext('2d');
const PX=3;
let W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
resize(); window.addEventListener('resize',()=>{resize();init();});

/* ── PALETTE ── */
const P={
  // sky
  sky0:'#030712',sky1:'#060e20',sky2:'#0a1830',sky3:'#0e2244',sky4:'#142d58',
  // stars
  star:'#c8dcff',
  // moon
  moon:'#e8f0ff',moonSh:'#a0b4e0',
  // clouds
  cl0:'#1a2a42',cl1:'#223050',cl2:'#2a3a60',
  // forest
  tr0:'#060f04',tr1:'#091507',tr2:'#0d1f0a',tr3:'#12280d',tr4:'#172f10',tr5:'#1d3a14',tr6:'#234519',
  trunk:'#1a1008',trunk2:'#2a1a0c',
  // ground
  gr0:'#080e04',gr1:'#0a1306',gr2:'#0d1908',gr3:'#111f0a',gr4:'#162509',
  road:'#101418',road2:'#181e24',roadLine:'#2a3040',sidewalk:'#1a1e26',
  // buildings – residential
  res0:'#14202e',res1:'#1c2c40',res2:'#243450',res3:'#2c3c5a',
  // hospital
  hosp0:'#1a2838',hosp1:'#243548',hosp2:'#ffffff',hosp3:'#e8f0f8',hospCross:'#e83030',
  // mall (торговый центр)
  mall0:'#1e1a28',mall1:'#2a2438',mall2:'#38306c',mall3:'#4a4080',
  // prison
  pris0:'#1a1a14',pris1:'#242418',pris2:'#2e2e20',prisBar:'#3a3828',
  // tower (сотовая вышка)
  tow:'#1e2430',towLight:'#ff3030',
  // windows
  winW:'#b8e0ff',winY:'#ffe0a0',winG:'#a0ffcc',winOff:'#0a1020',winRed:'#ff8080',
  // street lights
  lamp:'#2a3040',lampGlow:'rgba(255,220,120,0.3)',lampTop:'#ffe080',
  // cars
  car0:'#c82020',car1:'#2060c8',car2:'#20a040',car3:'#c8c820',car4:'#8020c8',
  // people
  ped0:'#e8c090',ped1:'#c09060',ped2:'#806040',
  // smoke / exhaust
  smk:'#808898',
};

/* ── STATE ── */
let stars=[],clouds=[],buildings=[],trees=[],streetlights=[],cars=[],people=[],smokes=[];
let cellTower={};

/* ── INIT ── */
function init(){
  makeStars(); makeClouds(); makeScene(); makeTrees(); makeStreetlights(); makeCars(); makePeople();
}

function makeStars(){
  stars=[];
  for(let i=0;i<140;i++) stars.push({x:Math.random()*W,y:Math.random()*(H*0.48),t:Math.random()*Math.PI*2,s:Math.random()>.88?2:1});
}
function makeClouds(){
  clouds=[];
  for(let i=0;i<7;i++) clouds.push({x:Math.random()*W,y:20+Math.random()*(H*0.28),w:70+Math.random()*120,h:22+Math.random()*34,spd:.15+Math.random()*.22,a:.3+Math.random()*.45});
}

/* ── BUILDINGS SETUP ── */
function makeScene(){
  buildings=[];
  const base=Math.round(H*.635);
  let x=Math.round(W*.2);

  // helper
  function add(cfg){buildings.push({...cfg,base,wins:[]});const b=buildings[buildings.length-1];makeWins(b);}

  // торговый центр (широкий, невысокий, стеклянный фасад)
  add({id:'mall',x,y:base-72,w:96,h:72,type:'mall',hasChimney:false,chimneyX:0,smoke:false,signY:14,signW:80});
  x+=100;

  // жилой дом 5-этажный
  add({id:'res',x,y:base-88,w:52,h:88,type:'res',hasChimney:false,sign:false});
  x+=56;

  // больница (белая, крест)
  add({id:'hosp',x,y:base-100,w:68,h:100,type:'hosp',hasChimney:false});
  x+=72;

  // жилой 9-этажный
  add({id:'res2',x,y:base-130,w:44,h:130,type:'res',hasChimney:false});
  x+=48;

  // тюрьма (приземистая, мрачная)
  add({id:'pris',x,y:base-58,w:74,h:58,type:'pris',hasChimney:false});
  x+=78;

  // жилой 7-этажный
  add({id:'res3',x,y:base-112,w:48,h:112,type:'res',hasChimney:false});
  x+=52;

  // торговый центр 2
  add({id:'mall2',x,y:base-66,w:80,h:66,type:'mall',hasChimney:false});

  // сотовая вышка (справа у леса)
  cellTower={x:Math.round(W*.81),y:base,h:160};
}

function makeWins(b){
  b.wins=[];
  const cols=Math.floor(b.w/(PX*5+2));
  const rows=Math.floor(b.h/(PX*5+4));
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const ox=PX+c*(PX*5+2), oy=PX*3+r*(PX*5+4);
      if(oy+PX*4>b.h-4) continue;
      b.wins.push({ox,oy,on:Math.random()>.35,timer:Math.floor(Math.random()*600+120),warm:Math.random()>.5,type:['W','Y','G'][Math.floor(Math.random()*3)]});
    }
  }
}

function makeTrees(){
  trees=[];
  const base=Math.round(H*.645);
  // LEFT FOREST — dense, foreground+background
  for(let i=0;i<32;i++){
    const x=4+i*Math.round(W*.006+Math.random()*W*.005);
    const h=60+Math.random()*80;
    trees.push({x,y:base,h,w:16+Math.random()*16,sway:Math.random()*Math.PI*2,swaySpd:.005+Math.random()*.005,side:'L',layer:i%2});
  }
  // RIGHT FOREST
  for(let i=0;i<28;i++){
    const x=Math.round(W*.84)+i*(Math.round(W*.006)+Math.floor(Math.random()*W*.004));
    const h=60+Math.random()*80;
    trees.push({x,y:base,h,w:16+Math.random()*16,sway:Math.random()*Math.PI*2,swaySpd:.005+Math.random()*.005,side:'R',layer:i%2});
  }
}

function makeStreetlights(){
  streetlights=[];
  const base=Math.round(H*.64);
  for(let x=Math.round(W*.2);x<Math.round(W*.82);x+=Math.round(W*.065)){
    streetlights.push({x,y:base});
  }
}

function makeCars(){
  cars=[];
  const roadY=Math.round(H*.655);
  const carColors=[P.car0,P.car1,P.car2,P.car3,P.car4];
  for(let i=0;i<5;i++){
    cars.push({
      x:Math.round(W*(.15+i*.14)),y:roadY,
      vx:.6+Math.random()*.8,dir:i%2===0?1:-1,
      col:carColors[i%carColors.length],
      w:22,h:10,lights:true,
      exhaust:0,exTimer:0,
    });
  }
}

function makePeople(){
  people=[];
  const sidewalkY=Math.round(H*.648);
  for(let i=0;i<8;i++){
    people.push({
      x:Math.round(W*(.18+i*.08+Math.random()*.04)),
      y:sidewalkY,
      vx:(.2+Math.random()*.25)*(Math.random()>.5?1:-1),
      dir:Math.random()>.5?1:-1,
      frame:0,fTimer:0,
      col:[P.ped0,P.ped1,P.ped2][Math.floor(Math.random()*3)],
      minX:Math.round(W*.15),maxX:Math.round(W*.83),
    });
  }
}

/* ══ DRAW HELPERS ══ */
function r(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));}
function rp(x,y,c){r(x*PX,y*PX,PX,PX,c);}

/* ══ SKY ══ */
function drawSky(){
  const g=ctx.createLinearGradient(0,0,0,H*.65);
  g.addColorStop(0,P.sky0);g.addColorStop(.25,P.sky1);g.addColorStop(.55,P.sky2);g.addColorStop(.78,P.sky3);g.addColorStop(1,P.sky4);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H*.65);
}

/* ══ STARS ══ */
function drawStars(){
  stars.forEach(s=>{
    s.t+=.014;
    ctx.globalAlpha=.3+.55*Math.sin(s.t);
    ctx.fillStyle=P.star;
    ctx.fillRect(s.x,s.y,s.s*PX,s.s*PX);
  });
  ctx.globalAlpha=1;
}

/* ══ MOON ══ */
function drawMoon(){
  const mx=W*.87,my=H*.07,mr=20;
  const gl=ctx.createRadialGradient(mx,my,mr*.2,mx,my,mr*3.5);
  gl.addColorStop(0,'rgba(200,220,255,0.15)');gl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gl;ctx.beginPath();ctx.arc(mx,my,mr*3.5,0,Math.PI*2);ctx.fill();
  for(let dy=-mr;dy<=mr;dy+=PX){
    for(let dx=-mr;dx<=mr;dx+=PX){
      if(dx*dx+dy*dy<=mr*mr){ctx.fillStyle=dx<-3&&dy<-3?P.moonSh:P.moon;ctx.fillRect(mx+dx,my+dy,PX,PX);}
    }
  }
}

/* ══ CLOUDS ══ */
function drawClouds(){
  clouds.forEach(c=>{
    c.x+=c.spd; if(c.x>W+c.w*2)c.x=-c.w*2;
    ctx.globalAlpha=c.a;
    [[0,c.h*.35,c.w,c.h*.65,P.cl0],[c.w*.12,0,c.w*.76,c.h*.82,P.cl1],[c.w*.28,c.h*.08,c.w*.44,c.h*.62,P.cl2]].forEach(([ox,oy,cw,ch,col])=>{
      ctx.fillStyle=col;
      for(let dy=0;dy<ch;dy+=PX){const ins=Math.sin(dy/ch*Math.PI)*cw*.18;ctx.fillRect(Math.round(c.x+ox+ins),Math.round(c.y+oy+dy),Math.round(cw-ins*2),PX);}
    });
  });
  ctx.globalAlpha=1;
}

/* ══ HILLS ══ */
function drawHills(){
  const base=H*.65;
  [['#060d04',60,.9,.3],['#0a1406',44,1.5,1.0],['#0e1a08',30,2.2,2.0]].forEach(([col,amp,freq,phase])=>{
    ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(0,base);
    for(let x=0;x<=W;x+=PX){ctx.lineTo(x,base-amp*Math.sin(x/W*Math.PI*freq+phase)-amp*.5*Math.sin(x/W*Math.PI*freq*2.3));}
    ctx.lineTo(W,base);ctx.closePath();ctx.fill();
  });
}

/* ══ GROUND + ROADS ══ */
function drawGround(){
  const top=H*.63;
  const g=ctx.createLinearGradient(0,top,0,H);
  g.addColorStop(0,P.gr3);g.addColorStop(.2,P.gr2);g.addColorStop(.6,P.gr1);g.addColorStop(1,P.gr0);
  ctx.fillStyle=g;ctx.fillRect(0,top,W,H-top);
  // grass tufts
  ctx.fillStyle=P.gr4;
  for(let x=0;x<W;x+=PX*5){const ty=top+PX*Math.round(Math.sin(x*.04)*1.5);r(x,ty,PX*2,PX,P.gr4);r(x+PX,ty-PX,PX,PX*2,P.gr4);}
  // main road
  const ry=H*.65;
  r(0,ry,W,PX*8,P.road);
  r(0,ry+PX*3,W,PX*2,P.road2);
  // road dashes
  for(let x=0;x<W;x+=PX*12){r(x,ry+PX*3.5,PX*7,PX,P.roadLine);}
  // sidewalk
  r(Math.round(W*.15),ry-PX*3,Math.round(W*.69),PX*3,P.sidewalk);
}

/* ══ TREES (pixel conifers + deciduous) ══ */
function drawTree(tr,t){
  const sw=Math.sin(tr.sway)*2.5;
  const bx=tr.x+sw, by=tr.y, h=tr.h, w=tr.w;
  tr.sway+=tr.swaySpd;
  // trunk
  r(bx-PX,by-h*.22,PX*2,h*.22,P.trunk);r(bx-PX*.5,by-h*.22,PX,h*.22,P.trunk2);
  // canopy — 3 stacked triangles
  const lc=[P.tr1,P.tr2,P.tr3,P.tr4,P.tr5,P.tr6];
  const layers=3+Math.floor(h/40);
  for(let l=0;l<layers;l++){
    const ly=by-h*.18-l*(h*.22);
    const lw=w*(1.2-l*.15)*(1+.04*Math.sin(tr.sway+l));
    const lh=h*.3;
    for(let dy=0;dy<lh;dy+=PX){
      const ins=(dy/lh)*lw*.52;
      ctx.fillStyle=lc[Math.min(l+1,5)];
      r(bx-lw/2+ins,ly-lh+dy,lw-ins*2,PX,lc[Math.min(l,5)]);
    }
    // highlight
    for(let dy=0;dy<lh*.3;dy+=PX){
      const ins=(dy/lh)*lw*.3;
      r(bx-lw*.28+ins,ly-lh+dy,lw*.45-ins*2,PX,lc[Math.min(l+2,5)]);
    }
  }
}

/* ══ BUILDING DRAW ══ */
function drawBuildings(t){
  buildings.forEach(b=>{
    const {x,y,w,h,type,base}=b;

    // shadow
    ctx.globalAlpha=.25;r(x+5,base-3,w,5,'#000');ctx.globalAlpha=1;

    if(type==='mall'){
      // Mall: стеклянный фасад
      r(x,y,w,h,P.mall0);
      // glass panels
      for(let dx=0;dx<w;dx+=PX*7){
        r(x+dx,y,PX*6,h,dx%14===0?P.mall1:P.mall2);
        r(x+dx+PX*2,y,PX*2,h,P.mall3);
      }
      // roof detail
      r(x,y-PX*3,w,PX*3,P.mall1);
      r(x+w*.2,y-PX*5,w*.6,PX*2,P.mall2);
      // sign "ТЦ"
      ctx.fillStyle='rgba(255,200,50,0.8)'; ctx.font='bold 10px monospace';
      ctx.fillText('ТЦ',x+w/2-8,y+16);
      ctx.fillStyle='rgba(255,200,50,0.3)';
      r(x+4,y+20,w-8,PX,P.gold);
    } else if(type==='hosp'){
      // Hospital: белые стены
      r(x,y,w,h,P.hosp0);
      for(let dx=0;dx<w;dx+=PX*3)r(x+dx,y,PX*2,h,P.hosp1);
      r(x+2,y+2,w-4,h-4,P.hosp2);
      // cross
      const cx=x+w/2, cy=y+20, cs=12;
      r(cx-cs/2,cy-cs*1.5,cs,cs*3,P.hospCross);
      r(cx-cs*1.5,cy-cs/2,cs*3,cs,P.hospCross);
      // label
      ctx.fillStyle='rgba(200,30,30,0.9)'; ctx.font='bold 9px monospace';
      ctx.fillText('БОЛЬНИЦА',x+4,y+60);
      // roof
      r(x,y-PX*2,w,PX*2,P.hosp1);
      r(x+w*.1,y-PX*4,w*.8,PX*2,P.hosp0);
    } else if(type==='pris'){
      // Prison: тёмная, угрюмая
      r(x,y,w,h,P.pris0);
      for(let dx=0;dx<w;dx+=PX*4)r(x+dx,y,PX*3,h,P.pris1);
      // bars on windows
      b.wins.forEach(win=>{
        r(x+win.ox,y+win.oy,PX*4,PX*3,P.winOff);
        // vertical bars
        r(x+win.ox+PX,y+win.oy,PX,PX*3,P.prisBar);
        r(x+win.ox+PX*2,y+win.oy,PX,PX*3,P.prisBar);
      });
      // watchtower corners
      r(x-PX,y-PX*8,PX*6,PX*8,P.pris2);
      r(x+w-PX*4,y-PX*8,PX*6,PX*8,P.pris2);
      r(x-PX*2,y-PX*8,PX*8,PX*3,P.pris1);
      r(x+w-PX*6,y-PX*8,PX*8,PX*3,P.pris1);
      ctx.fillStyle='rgba(160,140,100,0.7)'; ctx.font='bold 8px monospace';
      ctx.fillText('ТЮРЬМА',x+8,y+20);
      return; // skip normal windows
    } else {
      // Residential
      const cols=[P.res0,P.res1,P.res2,P.res3];
      for(let dx=0;dx<w;dx+=PX*3)r(x+dx,y,PX*3,h,cols[Math.floor(dx/w*4)]);
      r(x,y,PX*2,h,P.res0);r(x+w-PX*2,y,PX*2,h,P.res0);
      // roof
      r(x,y-PX*3,w,PX*3,P.res1);
      // roof antennas / AC units
      r(x+4,y-PX*5,6,PX*2,P.res0);
      r(x+w-12,y-PX*4,10,PX*3,P.res1);
    }

    // windows (skip prison — handled above)
    if(type!=='pris'){
      b.wins.forEach(win=>{
        win.timer--;
        if(win.timer<=0){win.on=Math.random()>.12;win.timer=200+Math.floor(Math.random()*500);}
        const wx=x+win.ox, wy=y+win.oy;
        if(win.on){
          const flicker=type==='hosp'?.95:.8+.2*Math.sin(t*.07+wx+wy);
          ctx.globalAlpha=flicker;
          const col=type==='hosp'?P.winW:win.type==='Y'?P.winY:win.type==='G'?P.winG:P.winW;
          r(wx,wy,PX*4,PX*3,col);
          ctx.globalAlpha=1;
          // glow
          const gl=ctx.createRadialGradient(wx+PX*2,wy+PX*1.5,0,wx+PX*2,wy+PX*1.5,18);
          gl.addColorStop(0,win.type==='Y'?'rgba(255,200,80,0.14)':'rgba(140,200,255,0.1)');
          gl.addColorStop(1,'rgba(0,0,0,0)');
          ctx.fillStyle=gl;ctx.fillRect(wx-12,wy-10,40,30);
        } else {
          r(wx,wy,PX*4,PX*3,P.winOff);
        }
        // window frame
        ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;ctx.strokeRect(wx,wy,PX*4,PX*3);
      });
    }

    // AC units / vents on roof
    if(type==='res'||type==='mall'){
      for(let i=0;i<Math.floor(w/20);i++){
        r(x+8+i*20,y-PX*2,8,PX*2,P.res2);
        // emit AC smoke
        if(Math.random()>.97) smokes.push({x:x+12+i*20,y:y-PX*3,vx:(Math.random()-.5)*.3,vy:-.4-Math.random()*.3,life:80+Math.random()*60,maxLife:140,r:2+Math.random()*3});
      }
    }
  });
}

/* ══ CELL TOWER ══ */
function drawCellTower(t){
  const {x,y,h}=cellTower;
  // legs (tapering)
  for(let dy=0;dy<h;dy+=PX){
    const tw=Math.max(1,Math.round((1-dy/h)*8));
    r(x-tw/2,y-dy,tw,PX,P.tow);
  }
  // cross-beams
  for(let dy=20;dy<h;dy+=24){r(x-12,y-dy,24,PX,P.tow);}
  // antennas at top
  r(x-8,y-h,PX,PX*6,P.tow);r(x+4,y-h,PX,PX*6,P.tow);r(x-2,y-h-PX*3,PX*2,PX*3,P.tow);
  // blinking red light
  const blink=Math.sin(t*.06)>.3;
  r(x-PX,y-h-PX*4,PX*2,PX*2,blink?P.towLight:'#400000');
  if(blink){
    ctx.globalAlpha=.3;
    r(x-8,y-h-PX*8,16,16,'rgba(255,0,0,0.4)');
    ctx.globalAlpha=1;
  }
}

/* ══ STREET LIGHTS ══ */
function drawStreetlights(t){
  streetlights.forEach(sl=>{
    // pole
    r(sl.x,sl.y-PX*14,PX*2,PX*14,P.lamp);
    // arm
    r(sl.x-PX*5,sl.y-PX*14,PX*5,PX*2,P.lamp);
    // lamp head
    r(sl.x-PX*7,sl.y-PX*16,PX*4,PX*2,P.lampTop);
    // glow cone
    const gl=ctx.createRadialGradient(sl.x-PX*5,sl.y-PX*14,0,sl.x-PX*5,sl.y-PX*14,36);
    gl.addColorStop(0,'rgba(255,220,100,0.22)');gl.addColorStop(1,'rgba(255,220,100,0)');
    ctx.fillStyle=gl;ctx.fillRect(sl.x-PX*5-36,sl.y-PX*14-20,72,60);
  });
}

/* ══ SMOKE ══ */
function updateSmokes(){
  smokes=smokes.filter(s=>s.life>0);
  smokes.forEach(s=>{
    s.x+=s.vx;s.y+=s.vy;s.life--;
    const a=(s.life/s.maxLife)*.4;
    const rad=s.r*(1.3-s.life/s.maxLife*.4);
    ctx.globalAlpha=a;
    ctx.fillStyle=P.smk;
    for(let dy=-rad;dy<rad;dy+=PX){for(let dx=-rad;dx<rad;dx+=PX){if(dx*dx+dy*dy<rad*rad)ctx.fillRect(s.x+dx,s.y+dy,PX,PX);}}
  });
  ctx.globalAlpha=1;
}

/* ══ CARS ══ */
function drawCars(t){
  const ry=H*.655;
  cars.forEach(c=>{
    c.x+=c.vx*c.dir;
    if(c.x>W+40)c.x=-40;
    if(c.x<-40)c.x=W+40;

    c.exTimer++;
    if(c.exTimer>8){c.exTimer=0;
      if(Math.random()>.6) smokes.push({x:c.x-(c.dir>0?c.w/2:-c.w/2),y:ry,vx:(Math.random()-.5)*.2,vy:-.2-Math.random()*.15,life:40+Math.random()*30,maxLife:70,r:1.5+Math.random()*2});
    }

    const cx=c.x, cy=ry-c.h;
    // body
    r(cx-c.w/2,cy,c.w,c.h,c.col);
    // roof
    r(cx-c.w*.3,cy-c.h*.6,c.w*.6,c.h*.6,c.col);
    // windows
    r(cx-c.w*.25,cy-c.h*.55,c.w*.2,c.h*.45,P.winW);
    r(cx+c.w*.05,cy-c.h*.55,c.w*.2,c.h*.45,P.winW);
    // wheels
    [-.35,.35].forEach(ox=>{r(cx+c.w*ox-PX,cy+c.h-PX,PX*3,PX*2,'#0a0a0a');});
    // headlights / taillights
    if(c.dir>0){
      r(cx+c.w/2-2,cy+2,3,3,'#fffac0');
      r(cx-c.w/2,cy+2,3,3,'#ff2020');
    } else {
      r(cx-c.w/2,cy+2,3,3,'#fffac0');
      r(cx+c.w/2-2,cy+2,3,3,'#ff2020');
    }
  });
}

/* ══ PEOPLE ══ */
function drawPeople(t){
  people.forEach(p=>{
    p.fTimer++;
    if(p.fTimer>14){p.frame=(p.frame+1)%4;p.fTimer=0;}
    p.x+=p.vx;
    if(p.x>p.maxX)p.vx=-Math.abs(p.vx);
    if(p.x<p.minX)p.vx=Math.abs(p.vx);
    p.dir=p.vx>0?1:-1;

    const x=p.x,y=p.y;
    const leg=[0,2,0,-2][p.frame]*PX*.5;
    // shadow
    ctx.globalAlpha=.2;r(x-5,y+1,10,2,'#000');ctx.globalAlpha=1;
    // body
    r(x-PX,y-PX*5,PX*2,PX*2,p.col==='#e8c090'?'#3050a0':'#502020'); // jacket
    r(x-PX*.5,y-PX*7,PX,PX*2,p.col); // head
    r(x-PX,y-PX*3+leg,PX,PX*2,'#2a2a3a'); // leg L
    r(x+PX*.5,y-PX*3-leg,PX,PX*2,'#2a2a3a'); // leg R
    // arm (swinging)
    if(p.dir>0)r(x+PX,y-PX*5+leg,PX,PX,'#1a3060');
    else r(x-PX*2,y-PX*5-leg,PX,PX,'#1a3060');
  });
}

/* ══ MAIN LOOP ══ */
let t=0;
function frame(){
  t++;
  ctx.clearRect(0,0,W,H);
  drawSky();
  drawStars();
  drawMoon();
  drawClouds();
  drawHills();
  // back trees (behind buildings)
  trees.filter(tr=>tr.layer===1).forEach(tr=>drawTree(tr,t));
  drawGround();
  drawBuildings(t);
  drawCellTower(t);
  drawStreetlights(t);
  // front trees
  trees.filter(tr=>tr.layer===0).forEach(tr=>drawTree(tr,t));
  updateSmokes();
  drawCars(t);
  drawPeople(t);
  requestAnimationFrame(frame);
}

init();frame();
})();
</script>
